function openZone(z){

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function shade(hex){const n=parseInt(hex.slice(1),16);let r=Math.max(0,(n>>16)-32),g=Math.max(0,((n>>8)&255)-32),b=Math.max(0,(n&255)-32);return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');}
function renderMd(md){
  let t=md||'';
  t=t.replace(/\[\[([^\]]+)\]\]/g,(m,p)=>{let d=p.split('|').pop().split('/').pop();return '<span class="wl">'+esc(d)+'</span>';});
  if(window.marked){ try{ marked.setOptions({breaks:true,gfm:true}); return marked.parse(t);}catch(e){} }
  return '<pre class="raw">'+esc(t)+'</pre>';
}

    var stats=DATA.publicStats;
    var steps=[
      ['1','社群收藏','Threads / FB / 網頁隨手存下的線索','手動'],
      ['2','AI 三層預篩選','驗證連結與數字 · 分類到地標 · 去重比對全庫','自動'],
      ['3','入庫四步驟','過價值閘門，逐條校準與拍板','人工'],
      ['4','Wiki 化','把材料重寫成自己的觀點與框架','人工'],
      ['5','全庫健診','定期掃描觀點品質、標記待更新','自動'],
      ['6','知識城鎮','跑完管線的成果，對外走得進來的展示','成果']
    ];
    var flow='';
    for(var i=0;i<steps.length;i++){
      var s=steps[i];
      flow+='<div class="tstep"><div class="tn">'+s[0]+'</div>'+
            '<div class="tt">'+s[1]+'<span>'+s[2]+'</span></div>'+
            '<div class="tg">'+s[3]+'</div></div>';
      if(i<steps.length-1) flow+='<div class="tarw">↓</div>';
    }
    var html=
      '<div class="tour-lead">你剛剛走進來的這座城鎮，不是一張漂亮的地圖而已——它是一整套系統的樣子。'+
      '每一個地標是一個知識領域，每一本書是一篇筆記；新增材料會先經過篩選，再由我決定是否入庫。</div>'+
      '<div class="tour-grid">'+
        '<div class="tour-stat"><b>'+stats.notes.replace(' 篇筆記','')+'</b><span>篇筆記</span></div>'+
        '<div class="tour-stat"><b>'+stats.domains.replace(' 個主題領域','')+'</b><span>個主題領域</span></div>'+
        '<div class="tour-stat"><b>'+stats.landmarks.replace(' 個地標','')+'</b><span>個地標分區</span></div>'+
      '</div>'+
      '<div style="color:#3a2f23;font-weight:800;font-size:16px;margin:6px 0 12px;">從收藏到能力，管線怎麼跑</div>'+
      flow+
      '<div class="cta-block" style="margin-top:22px;text-align:left"><p style="margin-bottom:12px">'+
      '想看每個環節的細節與成果數字？</p>'+
      '<a class="ctaBtn" href="/work.html">看四個工作流案例 →</a>'+
      '<a class="lnk" href="/build.html" style="margin-left:16px">或看 1:1 代建 →</a></div>';
    document.getElementById('r-title').textContent='系統導覽 — 這座城鎮怎麼運作';
    var obs=document.getElementById('r-obs'); if(obs) obs.style.display='none';
    document.getElementById('r-body').innerHTML=html;
    document.getElementById('reader').classList.remove('hidden');
    var rc2=document.querySelector('#reader .rcard'); if(rc2) rc2.scrollTop=0;
  }
  var hs=document.querySelectorAll('#stage .hotspot');
  if(hs.length){
    var center=hs[hs.length-1];  // 中央噴泉最後建立
    center.onclick=function(e){ if(e) e.preventDefault(); openTour(); };
  }
})();
</script>
